<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 - Gestión de Jugadores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  font-family: 'Roboto', sans-serif;
  min-height: 100vh;
  color: #fff;
}

/* ===== LOGIN ===== */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0a 0%, #0d1f0d 50%, #0a0a0a 100%);
}

.login-box {
  background: rgba(0,0,0,0.85);
  border: 1px solid #3a6b1a;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(184,240,48,0.1);
}

.login-logo {
  text-align: center;
  margin-bottom: 28px;
}

.login-logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 6px;
  color: #d4f030;
  text-shadow: 0 0 20px rgba(100,200,0,0.4);
}

.login-logo p {
  font-size: 13px;
  letter-spacing: 3px;
  color: #88aa44;
  text-transform: uppercase;
  margin-top: 4px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.form-group label {
  font-size: 12px;
  letter-spacing: 2px;
  color: #88aa44;
  text-transform: uppercase;
}

.form-group input, .form-group select, .form-group textarea {
  background: rgba(255,255,255,0.07);
  border: 1px solid #3a6b1a;
  border-radius: 8px;
  color: #fff;
  font-family: 'Roboto', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border 0.2s;
  width: 100%;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: #b8f030;
}

.form-group select option { background: #111; }

.btn-primary {
  background: linear-gradient(135deg, #7ddf00, #d4f030);
  border: none;
  border-radius: 8px;
  color: #000;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 3px;
  padding: 12px;
  text-transform: uppercase;
  width: 100%;
  transition: opacity 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { opacity: 0.85; }

.btn-secondary {
  background: rgba(184,240,48,0.1);
  border: 1px solid #3a6b1a;
  border-radius: 8px;
  color: #b8f030;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  padding: 10px 16px;
  text-transform: uppercase;
  transition: background 0.2s;
}
.btn-secondary:hover { background: rgba(184,240,48,0.2); }

.btn-danger {
  background: rgba(255,60,60,0.15);
  border: 1px solid rgba(255,60,60,0.4);
  border-radius: 6px;
  color: #ff6060;
  cursor: pointer;
  font-size: 12px;
  padding: 5px 10px;
  transition: background 0.2s;
}
.btn-danger:hover { background: rgba(255,60,60,0.3); }

.btn-edit {
  background: rgba(184,240,48,0.1);
  border: 1px solid rgba(184,240,48,0.3);
  border-radius: 6px;
  color: #b8f030;
  cursor: pointer;
  font-size: 12px;
  padding: 5px 10px;
  transition: background 0.2s;
}
.btn-edit:hover { background: rgba(184,240,48,0.2); }

.error-msg {
  color: #ff6060;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

.success-msg {
  color: #b8f030;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ===== MAIN APP ===== */
.app-screen { display: none; }

.navbar {
  background: rgba(0,0,0,0.95);
  border-bottom: 1px solid #3a6b1a;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 4px;
  color: #d4f030;
}

.navbar-user {
  display: flex;
  align-items: center;
  gap: 14px;
}

.user-badge {
  background: rgba(184,240,48,0.1);
  border: 1px solid #3a6b1a;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 13px;
  color: #b8f030;
  letter-spacing: 1px;
}

.perfil-badge {
  background: rgba(100,150,0,0.2);
  border: 1px solid rgba(184,240,48,0.3);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  color: #88cc22;
  letter-spacing: 1px;
}

.logout-btn {
  background: rgba(255,60,60,0.1);
  border: 1px solid rgba(255,60,60,0.3);
  border-radius: 8px;
  color: #ff6060;
  cursor: pointer;
  font-size: 13px;
  padding: 6px 14px;
  transition: background 0.2s;
}
.logout-btn:hover { background: rgba(255,60,60,0.2); }

.main-content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid #3a6b1a;
  padding-bottom: 0;
}

.tab-btn {
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: #666;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 10px 20px;
  text-transform: uppercase;
  transition: all 0.2s;
  margin-bottom: -1px;
}

.tab-btn.active {
  color: #d4f030;
  border-bottom-color: #d4f030;
}

.tab-btn:hover { color: #b8f030; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== EQUIPO CARD ===== */
.equipo-header {
  background: rgba(0,0,0,0.6);
  border: 1px solid #3a6b1a;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.equipo-logo {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  border: 1px solid #3a6b1a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.equipo-logo img { width:100%; height:100%; object-fit:cover; }

.equipo-info h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 4px;
  color: #d4f030;
}

.equipo-info p {
  color: #88aa44;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ===== JUGADORES TABLE ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: #b8f030;
  text-transform: uppercase;
}

.jugadores-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  overflow: hidden;
}

.jugadores-table th {
  background: rgba(184,240,48,0.08);
  color: #88cc22;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  padding: 12px 16px;
  text-align: left;
  text-transform: uppercase;
  border-bottom: 1px solid #3a6b1a;
}

.jugadores-table td {
  padding: 11px 16px;
  border-bottom: 1px solid rgba(58,107,26,0.3);
  font-size: 14px;
  color: #ddd;
}

.jugadores-table tr:last-child td { border-bottom: none; }
.jugadores-table tr:hover td { background: rgba(184,240,48,0.04); }

.num-badge {
  background: rgba(184,240,48,0.15);
  border: 1px solid rgba(184,240,48,0.3);
  border-radius: 6px;
  color: #d4f030;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  padding: 2px 10px;
  display: inline-block;
}

.pos-badge {
  background: rgba(100,150,0,0.15);
  border-radius: 12px;
  color: #88cc22;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 3px 10px;
  text-transform: uppercase;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: #111;
  border: 1px solid #3a6b1a;
  border-radius: 14px;
  padding: 30px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 0 40px rgba(0,0,0,0.9);
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: #d4f030;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

/* ===== SOLICITUDES ===== */
.solicitud-card {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(58,107,26,0.5);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.solicitud-info { flex: 1; }
.solicitud-info h4 {
  font-size: 15px;
  color: #fff;
  margin-bottom: 4px;
}
.solicitud-info p {
  font-size: 12px;
  color: #88aa44;
  letter-spacing: 1px;
}

.status-pendiente {
  background: rgba(255,180,0,0.15);
  border: 1px solid rgba(255,180,0,0.3);
  border-radius: 12px;
  color: #ffb400;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 3px 10px;
  text-transform: uppercase;
}

.status-aprobado {
  background: rgba(100,200,0,0.15);
  border: 1px solid rgba(100,200,0,0.3);
  border-radius: 12px;
  color: #b8f030;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 3px 10px;
  text-transform: uppercase;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: rgba(255,255,255,0.25);
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.loading { text-align:center; color:#88aa44; padding:30px; letter-spacing:3px; font-size:14px; }
</style>
</head>

  </div>
</div>

<div class="modal-overlay" id="modalEditar">

    <div class="modal-title">✏️ Editar Solicitud</div>
    <input type="hidden" id="editIdx">
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="editNombre" placeholder="Nombre del jugador">

      <label>Número</label>
      <input type="number" id="editNumero" placeholder="Número de camiseta" min="1" max="99">
    </div>
    <div class="form-group">
      <label>Posición</label>
      <select id="editPosicion">
        <option value="">— Selecciona —</option>

<script>
const EQUIPOS_MAP = {
  '1': 'Soldados Del Amor',
  '2': 'Cuervos F.C',
  '3': 'Unión 8',
  '4': 'La Garra',
  '5': 'Pumas KAP',
  '6': 'Los Chipotles',
  '7': 'Deportivo CT',
  '8': 'Gusanitos',
  '9': 'Next Level 1',
  '10': 'Next Level 2'
};

const CSV_USUARIOS   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=961328720&single=true&output=csv';
const CSV_JUGADORES  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=1940220650&single=true&output=csv';
const CSV_EQUIPOS    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=1894947293&single=true&output=csv';
const CSV_SOLICITUDES= 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=361108680&single=true&output=csv';
const CSV_EQUIPOS_LOGIN = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=551614075&single=true&output=csv';
const APPS_SCRIPT    = 'https://script.google.com/macros/s/AKfycbweUhq4kd7c9M6hT7bqZ_VxE5JL9dEwYcdBN-jep0l7AcQKhqvC8_1mh8AMZteMY5gy/exec';

let currentUser = null;
let equiposLogin = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,''));
    return obj;
  });
}

function isAdmin() {
  return currentUser && (currentUser.Perfil === 'Desarrollador' || currentUser.Perfil === 'Administrador');
}

function cambiarTipoLogin() {
  const tipo = document.getElementById('loginTipo').value;
  document.getElementById('loginEquipoSection').style.display = tipo === 'equipo' ? 'block' : 'none';
  document.getElementById('loginAdminSection').style.display = tipo === 'admin' ? 'block' : 'none';
}

async function cargarEquiposLogin() {
  try {
    const res = await fetch(CSV_EQUIPOS_LOGIN);
    equiposLogin = parseCSV(await res.text());
    const sel = document.getElementById('loginEquipoSelect');
    sel.innerHTML = '<option value="">— Selecciona tu equipo —</option>';
    equiposLogin.filter(e => e.Estatus === 'TRUE').forEach(e => {
      sel.innerHTML += `<option value="${e.ID_Equipo}">${e.Nombre}</option>`;
    });
  } catch(err) {
    document.getElementById('loginEquipoSelect').innerHTML = '<option value="">Error cargando equipos</option>';
  }
}

async function doLogin() {
  const tipo = document.getElementById('loginTipo').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (tipo === 'equipo') {
    // Login por equipo
    const idEquipo = document.getElementById('loginEquipoSelect').value;
    const pass = document.getElementById('loginPassEquipo').value.trim();

    if (!idEquipo) { errEl.textContent = '⚠️ Selecciona tu equipo'; return; }
    if (!pass) { errEl.textContent = '⚠️ Ingresa la contraseña'; return; }

    const equipo = equiposLogin.find(e =>
      String(e.ID_Equipo) === String(idEquipo) &&
      e.Contraseña.trim() === pass &&
      e.Estatus === 'TRUE'
    );

    if (!equipo) { errEl.textContent = '❌ Contraseña incorrecta'; return; }

    currentUser = {
      UsuarioID: equipo.Nombre,
      Apodo: equipo.Nombre,
      Perfil: 'Participante',
      ID_Equipo: equipo.ID_Equipo,
      Estatus: 'TRUE'
    };
    iniciarApp();

  } else {
    // Login admin
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();

    if (!user || !pass) { errEl.textContent = '⚠️ Ingresa usuario y contraseña'; return; }

    try {
      const res = await fetch(CSV_USUARIOS);
      const usuarios = parseCSV(await res.text());
      const found = usuarios.find(u => {
        const matchUser = u.UsuarioID.trim().toLowerCase() === user.toLowerCase();
        const matchPass = u.Contraseña.trim() === pass;
        const matchEstatus = u.Estatus.toString().trim().toUpperCase() === 'TRUE';
        return matchUser && matchPass && matchEstatus;
      });

      if (!found) { errEl.textContent = '❌ Usuario o contraseña incorrectos'; return; }
      currentUser = found;
      iniciarApp();
    } catch(e) {
      errEl.textContent = '❌ Error de conexión: ' + e.message;
    }
  }
}

function iniciarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('navUser').textContent = currentUser.Apodo || currentUser.UsuarioID;
  document.getElementById('navPerfil').textContent = currentUser.Perfil;

  // Mostrar tab solicitudes solo a admin/dev
  if (isAdmin()) {
    document.getElementById('tabSolicitudes').style.display = 'block';
  }

  cargarEquipo();
  cargarJugadores();
  if (isAdmin()) cargarSolicitudes();
}

async function cargarEquipo() {
  const cont = document.getElementById('equipoHeader');
  try {
    const [resE] = await Promise.all([fetch(CSV_EQUIPOS)]);
    const equipos = parseCSV(await resE.text());

    let misEquipos = [];
    if (isAdmin()) {
      misEquipos = equipos;
    } else {
      misEquipos = equipos.filter(e => String(e.ID_Equipo) === String(currentUser.ID_Equipo));
    }

    if (misEquipos.length === 0) {
      cont.innerHTML = '<div class="empty-state">No tienes equipo asignado</div>';
      return;
    }

    cont.innerHTML = misEquipos.map(eq => `
      <div class="equipo-header">
        <div class="equipo-logo">
          ${eq.URL ? `<img src="${eq.URL}" onerror="this.style.display='none'">` : '⚽'}
        </div>
        <div class="equipo-info">
          <h2>${eq.Nombre || 'Equipo ' + eq.ID_Equipo}</h2>
          <p>📍 ${eq.Ciudad || '—'} &nbsp;|&nbsp; ID: ${eq.ID_Equipo}</p>
        </div>
      </div>
    `).join('');

  } catch(e) {
    cont.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

async function cargarJugadores() {
  const cont = document.getElementById('jugadoresTable');
  cont.innerHTML = '<div class="loading">Cargando jugadores...</div>';
  try {
    const res = await fetch(CSV_JUGADORES);
    const jugadores = parseCSV(await res.text());

    let misList = [];
    if (isAdmin()) {
      misList = jugadores;
      document.getElementById('jugadoresTitulo').textContent = `Todos los jugadores (${jugadores.length})`;
    } else {
      misList = jugadores.filter(j => String(j.Equipo) === String(currentUser.ID_Equipo));
      document.getElementById('jugadoresTitulo').textContent = `Mis Jugadores (${misList.length})`;
    }

    if (misList.length === 0) {
      cont.innerHTML = '<div class="empty-state">No hay jugadores registrados</div>';
      return;
    }

    cont.innerHTML = `
      <table class="jugadores-table">
        <thead>
          <tr>
            ${isAdmin() ? '<th>Equipo</th>' : ''}
            <th>#</th>
            <th>Nombre</th>
            <th>Posición</th>
          </tr>
        </thead>
        <tbody>
          ${misList.map(j => `
            <tr>
              ${isAdmin() ? `<td>${j.Equipo}</td>` : ''}
              <td><span class="num-badge">${j.Numero || '—'}</span></td>
              <td>${j.Nombre}</td>
              <td>${j.Posicion ? `<span class="pos-badge">${j.Posicion}</span>` : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

  } catch(e) {
    cont.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

async function cargarSolicitudes() {
  const cont = document.getElementById('solicitudesList');
  cont.innerHTML = '<div class="loading">Cargando solicitudes...</div>';
  try {
    const res = await fetch(CSV_SOLICITUDES + '&t=' + Date.now());
    const sols = parseCSV(await res.text());
    const pendientes = sols.filter(s => s.Estatus === 'Pendiente');

    if (pendientes.length === 0) {
      cont.innerHTML = '<div class="empty-state">No hay solicitudes pendientes ✅</div>';
      return;
    }

    cont.innerHTML = pendientes.map(s => `
      <div class="solicitud-card">
        <div class="solicitud-info">
          <h4>${s.Nombre} &nbsp; <span class="num-badge">#${s.Numero}</span></h4>
          <p>Equipo: ${s.ID_Equipo} &nbsp;|&nbsp; Posición: ${s.Posicion || '—'} &nbsp;|&nbsp; Solicitado por: ${s.UsuarioID} &nbsp;|&nbsp; ${s.Fecha}</p>
        </div>
        <span class="status-pendiente">Pendiente</span>
      </div>
    `).join('');

  } catch(e) {
    cont.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

function abrirModalJugador() {
  document.getElementById('jNombre').value = '';
  document.getElementById('jNumero').value = '';
  document.getElementById('jPosicion').value = '';
  document.getElementById('modalMsg').textContent = '';

  const idEquipo = String(currentUser.ID_Equipo);
  const nombreEquipo = EQUIPOS_MAP[idEquipo] || 'Equipo ' + idEquipo;

  // Restaurar campo equipo como input readonly por si acaso
  const equipoEl = document.getElementById('jEquipo');
  if (equipoEl.tagName === 'SELECT') {
    equipoEl.outerHTML = `<input type="text" id="jEquipo" readonly style="opacity:0.7;cursor:not-allowed;">`;
  }
  document.getElementById('jEquipo').value = idEquipo === '0' ? 'Administrador' : `${idEquipo} - ${nombreEquipo}`;

  document.getElementById('modalJugador').classList.add('active');
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('active');
}

async function enviarSolicitud() {
  const nombre  = document.getElementById('jNombre').value.trim();
  const numero  = document.getElementById('jNumero').value.trim();
  const posicion= document.getElementById('jPosicion').value.trim();
  const msgEl   = document.getElementById('modalMsg');

  if (!nombre || !numero) {
    msgEl.style.color = '#ff6060';
    msgEl.textContent = '⚠️ Nombre y número son obligatorios';
    return;
  }

  const btn = document.getElementById('btnEnviarSolicitud');
  btn.textContent = '⏳ Enviando...';
  btn.disabled = true;

  // Obtener equipo de la sesión
  const idEquipo = String(currentUser.ID_Equipo);
  const nombreEquipo = EQUIPOS_MAP[idEquipo] || 'Equipo ' + idEquipo;

  const data = {
    Fecha: new Date().toLocaleDateString('es-MX'),
    UsuarioID: currentUser.UsuarioID,
    Nombre: nombre,
    ID_Equipo: idEquipo,
    Numero: numero,
    Posicion: posicion
  };

  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    msgEl.style.color = '#b8f030';
    msgEl.textContent = '✅ Solicitud enviada correctamente';
    btn.textContent = 'Enviar Solicitud';
    btn.disabled = false;

    setTimeout(() => cerrarModal('modalJugador'), 2000);

  } catch(e) {
    msgEl.style.color = '#ff6060';
    msgEl.textContent = '❌ Error: ' + e.message;
    btn.textContent = 'Enviar Solicitud';
    btn.disabled = false;
  }
}

function showTab(name, event) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (event) event.target.classList.add('active');
  if (name === 'misSolicitudes') cargarMisSolicitudes();
  if (name === 'solicitudes') cargarSolicitudes();
}

async function cargarMisSolicitudes() {
  const cont = document.getElementById('misSolicitudesList');
  cont.innerHTML = '<div class="loading">Cargando solicitudes...</div>';
  try {
    const res = await fetch(CSV_SOLICITUDES + '&t=' + Date.now());
    const sols = parseCSV(await res.text());

    // Filtrar por equipo del usuario
    let misList = [];
    if (isAdmin()) {
      misList = sols;
    } else {
      misList = sols.filter(s => {
        const equipoSol = String(s.ID_Equipo || s.Id_Equipo || s.id_equipo || '').trim();
        const equipoUser = String(currentUser.ID_Equipo).trim();
        return equipoSol === equipoUser;
      });
    }

    if (misList.length === 0) {
      cont.innerHTML = '<div class="empty-state">No tienes solicitudes registradas</div>';
      return;
    }

    cont.innerHTML = `
      <table class="jugadores-table">
        <thead>
          <tr>
            <th>Fecha</th>
            ${isAdmin() ? '<th>Equipo</th>' : ''}
            <th>Nombre</th>
            <th>#</th>
            <th>Posición</th>
            <th>Estatus</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          ${misList.map((s, i) => `
            <tr>
              <td>${s.Fecha}</td>
              ${isAdmin() ? `<td>${EQUIPOS_MAP[s.ID_Equipo || s.Id_Equipo] || s.ID_Equipo || s.Id_Equipo}</td>` : ''}
              <td>${s.Nombre}</td>
              <td><span class="num-badge">${s.Numero}</span></td>
              <td>${s.Posicion ? `<span class="pos-badge">${s.Posicion}</span>` : '—'}</td>
              <td><span class="${s.Estatus === 'Pendiente' ? 'status-pendiente' : 'status-aprobado'}">${s.Estatus}</span></td>
              <td>
                ${s.Estatus === 'Pendiente' ? `
                  <button class="btn-edit" onclick="abrirEditar(${i}, '${s.Nombre}', '${s.Numero}', '${s.Posicion}')">✏️ Editar</button>
                ` : '—'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

    // Guardar lista para edición
    window._misSolicitudes = misList;

  } catch(e) {
    cont.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

function abrirEditar(idx, nombre, numero, posicion) {
  document.getElementById('editNombre').value = nombre;
  document.getElementById('editNumero').value = numero;
  document.getElementById('editPosicion').value = posicion;
  document.getElementById('editIdx').value = idx;
  document.getElementById('editMsg').textContent = '';
  document.getElementById('modalEditar').classList.add('active');
}

async function guardarEdicion() {
  const idx = parseInt(document.getElementById('editIdx').value);
  const nombre = document.getElementById('editNombre').value.trim();
  const numero = document.getElementById('editNumero').value.trim();
  const posicion = document.getElementById('editPosicion').value.trim();
  const msgEl = document.getElementById('editMsg');

  if (!nombre || !numero) {
    msgEl.style.color = '#ff6060';
    msgEl.textContent = '⚠️ Nombre y número son obligatorios';
    return;
  }

  const btn = document.getElementById('btnGuardarEdicion');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;

  const sol = window._misSolicitudes[idx];
  const data = {
    accion: 'editar',
    hoja: 'Solicitudes',
    id: sol.Fecha + '|' + sol.UsuarioID + '|' + sol.Nombre,
    fila: [sol.Fecha, sol.UsuarioID, nombre, sol.ID_Equipo, numero, posicion, 'Pendiente']
  };

  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    msgEl.style.color = '#b8f030';
    msgEl.textContent = '✅ Actualizado correctamente';
    btn.textContent = 'Guardar';
    btn.disabled = false;
    setTimeout(() => { cerrarModal('modalEditar'); cargarMisSolicitudes(); }, 1500);
  } catch(e) {
    msgEl.style.color = '#ff6060';
    msgEl.textContent = '❌ Error: ' + e.message;
    btn.textContent = 'Guardar';
    btn.disabled = false;
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginPassEquipo').value = '';
  document.getElementById('loginError').textContent = '';
}

// Cargar equipos al iniciar
cargarEquiposLogin();
</script>
